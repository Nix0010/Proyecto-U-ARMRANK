version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: armrank_db
    restart: always
    environment:
      POSTGRES_USER: tournament
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ArmR4nk_Pr0d_2026!}
      POSTGRES_DB: tournament_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - armrank_network
    # No exponer puerto externamente en producción

  # Backend API (Node.js + Prisma)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: armrank_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://tournament:${DB_PASSWORD:-ArmR4nk_Pr0d_2026!}@postgres:5432/tournament_db?schema=public
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: https://armrank.site
    depends_on:
      - postgres
    networks:
      - armrank_network

  # Frontend Web (React + Vite via Nginx)
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile.prod
    container_name: armrank_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-prod.conf:/etc/nginx/conf.d/default.conf
      - certbot_data:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    depends_on:
      - backend
    networks:
      - armrank_network

  # Certbot para SSL
  certbot:
    image: certbot/certbot
    container_name: armrank_certbot
    volumes:
      - certbot_data:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  certbot_data:
  certbot_certs:

networks:
  armrank_network:
    driver: bridge
